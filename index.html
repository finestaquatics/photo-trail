<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Booth</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h2{
margin-top:20px;
}

#container{
position:relative;
width:90vw;
max-width:500px;
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
}

#video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

#frame{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
z-index:2;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
display:none;
}

</style>

</head>

<body>

<h2>Photo Booth</h2>

<div id="container">

<video
id="video"
autoplay
playsinline> </video>

<img id="frame">

</div>

<button id="snap">
Take Photo
</button>

<canvas id="canvas"></canvas>

<script>

const params =
new URLSearchParams(window.location.search);

const frame =
params.get("frame") || "default";

document.getElementById("frame").src =
"frames/" + frame + ".gif";

const video =
document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
}
})
.then(stream=>{
video.srcObject=stream;
})
.catch(()=>{
alert(
"Please allow camera access."
);
});

document
.getElementById("snap")
.addEventListener("click",()=>{

const canvas =
document.getElementById("canvas");

canvas.width=1080;
canvas.height=1080;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
1080,
1080
);

const frameImg =
document.getElementById("frame");

ctx.drawImage(
frameImg,
0,
0,
1080,
1080
);

const link =
document.createElement("a");

link.download =
"photobooth.png";

link.href =
canvas.toDataURL("image/png");

link.click();

});

</script>

</body>
</html>
